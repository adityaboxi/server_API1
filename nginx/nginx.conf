worker_processes auto;
events { worker_connections 1024; }

http {
    upstream orchestrator_upstream {
        server orchestrator:4000;   # internal service name in docker-compose
    }

    server {
        listen 80;

        # Health endpoint – passed directly to orchestrator
        location /health {
            proxy_pass http://orchestrator_upstream;
        }

        # Project management – passed directly to orchestrator
        location /api/projects {
            proxy_pass http://orchestrator_upstream;
        }

        # Routing for mock endpoints – uses Lua to fetch target
        location ~ ^/([^/]+)/(.*)$ {
            set $projectId $1;
            set $target "";

            # Call orchestrator's routing endpoint to get the container URL
            access_by_lua_block {
                local http = require("resty.http")
                local httpc = http.new()
                local res, err = httpc:request_uri("http://orchestrator:4000/api/routing/" .. ngx.var.projectId, {
                    method = "GET"
                })
                if not res then
                    ngx.log(ngx.ERR, "Failed to fetch routing: " .. err)
                    ngx.exit(500)
                end
                local cjson = require("cjson")
                local data = cjson.decode(res.body)
                if not data.target then
                    ngx.log(ngx.ERR, "No target for project " .. ngx.var.projectId)
                    ngx.exit(404)
                end
                ngx.var.target = data.target
            }

            # Proxy to the target container
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}