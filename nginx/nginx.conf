worker_processes auto;
events { worker_connections 1024; }
http {
    resolver 127.0.0.11 valid=30s;
    upstream orchestrator_upstream {
        server orchestrator:4000;
    }
    server {
        listen 80;

        location /health {
            proxy_pass http://orchestrator_upstream;
        }

        location /api/projects {
            proxy_pass http://orchestrator_upstream;
        }

        location ~ ^/([^/]+)/(.*)$ {
            set $projectId $1;
            set $target "";

            access_by_lua_block {
                local http = require("resty.http")
                local httpc = http.new()
                local res, err = httpc:request_uri(
                    "http://orchestrator:4000/api/routing/" .. ngx.var.projectId,
                    { method = "GET" }
                )

                if not res then
                    ngx.log(ngx.ERR, "Failed to fetch routing: " .. err)
                    ngx.status = 500
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "Internal server error"}')
                    return ngx.exit(500)
                end

                if res.status == 403 then
                    ngx.status = 403
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "Project is inactive. Please activate it to use the API."}')
                    return ngx.exit(403)
                end

                if res.status == 404 then
                    ngx.status = 404
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "Project not found"}')
                    return ngx.exit(404)
                end

                if res.status ~= 200 then
                    ngx.log(ngx.ERR, "Orchestrator returned status " .. res.status)
                    ngx.status = res.status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "Failed to resolve project"}')
                    return ngx.exit(res.status)
                end

                local cjson = require("cjson")
                local data = cjson.decode(res.body)
                if not data or not data.target then
                    ngx.log(ngx.ERR, "No target in response")
                    ngx.status = 404
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "Project target not found"}')
                    return ngx.exit(404)
                end

                ngx.var.target = data.target
            }

            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}