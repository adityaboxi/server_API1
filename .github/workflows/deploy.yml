name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE_MOCK: adityaisme/mock
  DOCKER_IMAGE_ORCH: adityaisme/orchestrator
  DOCKER_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Mock image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE_MOCK }}:${{ env.DOCKER_TAG }}

      - name: Build and push Orchestrator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.orchestrator
          push: true
          tags: ${{ env.DOCKER_IMAGE_ORCH }}:${{ env.DOCKER_TAG }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/mock-api
            docker compose pull
            docker compose up -d --force-recreate
            docker system prune -f